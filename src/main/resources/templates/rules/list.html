<!doctype html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Regelgruppen</title>
    <base th:href="@{/}">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.css}">
    <link rel="stylesheet" th:href="@{/webjars/datatables.net-bs5/css/dataTables.bootstrap5.min.css}">
</head>
<body class="bg-body-tertiary">
<nav class="navbar navbar-expand-lg bg-body border-bottom">
    <div class="container">
        <a class="navbar-brand fw-semibold" th:href="@{/rules}">
            <i class="bi bi-calendar-range me-2" aria-hidden="true"></i>Timeparser-Regeln
        </a>
        <div class="navbar-nav">
            <a class="nav-link active" th:href="@{/rules}">Regelgruppen</a>
            <a class="nav-link" th:href="@{/generated-rules}">Regeln &amp; Tests</a>
            <a class="nav-link" th:href="@{/tokens}">Platzhalter</a>
            <a class="nav-link" th:href="@{/plausibility}">Plausibilität</a>
            <form class="d-inline" th:action="@{/logout}" method="post">
                <button type="submit" class="nav-link btn btn-link">Abmelden</button>
            </form>
        </div>
    </div>
</nav>

<main class="container py-4">
    <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${message}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Schließen"></button>
    </div>

    <div class="d-flex flex-column flex-lg-row align-items-lg-center justify-content-between gap-3 mb-4">
        <div>
            <h1 class="h3 mb-1">Regelgruppen</h1>
            <p class="text-secondary mb-0">
                <span th:text="${#lists.size(groups)}">0</span> Gruppen
            </p>
        </div>
        <div class="d-flex flex-column flex-sm-row align-items-sm-center gap-2">
            <a class="btn btn-outline-primary" th:href="@{/rules/export}">
                <i class="bi bi-download" aria-hidden="true"></i>
                ZIP herunterladen
            </a>
            <a class="btn btn-primary" th:href="@{/rules/new}">
                <i class="bi bi-plus-lg" aria-hidden="true"></i>
                Neue Regelgruppe
            </a>
        </div>
    </div>

    <div class="table-responsive bg-body border rounded">
        <table id="groupsTable" class="table table-hover align-middle mb-0">
            <thead class="table-light">
            <tr>
                <th scope="col">ID</th>
                <th scope="col">Name</th>
                <th scope="col">Beschreibung</th>
                <th scope="col" class="text-end">Regeln</th>
                <th scope="col" class="text-end">Tests</th>
                <th scope="col" class="text-end text-nowrap position-sticky end-0 bg-body-tertiary z-1">Aktion</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="group : ${groups}">
                <th scope="row" th:text="${group.id}">1</th>
                <td th:text="${group.name}">R1</td>
                <td th:text="${group.description}"></td>
                <td class="text-end">
                    <a class="badge text-bg-secondary text-decoration-none"
                       th:href="@{/rules/{id}(id=${group.id})}"
                       th:text="${group.ruleCount}">1</a>
                </td>
                <td class="text-end">
                    <a class="badge text-bg-secondary text-decoration-none"
                       th:href="@{/rules/{id}(id=${group.id})}"
                       th:text="${group.testCount}">1</a>
                </td>
                <td class="text-end text-nowrap position-sticky end-0 bg-body z-1">
                    <div class="btn-group btn-group-sm" role="group" aria-label="Aktionen">
                        <a class="btn btn-outline-primary" th:href="@{/rules/{id}(id=${group.id})}">
                            Bearbeiten
                        </a>
                        <a class="btn btn-outline-danger" th:href="@{/rules/{id}/delete(id=${group.id})}">
                            Löschen
                        </a>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/webjars/jquery/dist/jquery.min.js}"></script>
<script th:src="@{/webjars/datatables.net/js/dataTables.min.js}"></script>
<script th:src="@{/webjars/datatables.net-bs5/js/dataTables.bootstrap5.min.js}"></script>
<script>
    const language = {
        search: 'Suchen:',
        lengthMenu: '_MENU_ Einträge pro Seite',
        info: '_START_ bis _END_ von _TOTAL_ Einträgen',
        infoEmpty: 'Keine Einträge vorhanden',
        infoFiltered: '(gefiltert aus _MAX_ Einträgen)',
        infoPostFix: '',
        thousands: '.',
        loadingRecords: 'Wird geladen...',
        processing: 'Bitte warten...',
        zeroRecords: 'Keine passenden Einträge gefunden',
        emptyTable: 'Keine Einträge vorhanden',
        paginate: {
            first: 'Erste',
            previous: 'Zurück',
            next: 'Weiter',
            last: 'Letzte'
        },
        aria: {
            orderable: 'Sortierung für diese Spalte aktivieren',
            orderableReverse: 'Umgekehrte Sortierung für diese Spalte aktivieren'
        }
    };
    new DataTable('#groupsTable', {
        pageLength: 50,
        lengthMenu: [
            [50, 100, 250, 1000, -1],
            ['50', '100', '250', '1000', 'Alle']
        ],
        language,
        columnDefs: [{orderable: false, searchable: false, targets: 5}],
    });
</script>
</body>
</html>
